<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="ระบบนำทาง AR สำหรับพิพิธภัณฑ์ - สแกน QR Code แล้วเดินตามเส้นแดง">
    <title>🧭 ระบบนำทาง</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        // Force LINE to open in external browser (Chrome/Safari)
        if (navigator.userAgent.indexOf("Line") > -1) {
            let url = window.location.href;
            if (url.indexOf("?") > -1) {
                url += "&openExternalBrowser=1";
            } else {
                url += "?openExternalBrowser=1";
            }
            window.location.href = url;
        }
    </script>
</head>
<body>
    <!-- ========== LANGUAGE TOGGLE ========== -->
    <div class="lang-toggle" onclick="toggleLanguage()">
        <span id="lang-text" title="switch language: TH/EN/ZH">EN</span>
    </div>

    <!-- ========== WELCOME SCREEN ========== -->
    <div id="welcome-screen" class="screen active">
        <div class="welcome-bg"></div>
        <div class="welcome-content">
            <div class="museum-icon">🏛️</div>
            <h1 data-i18n="title">นำทางไปพิพิธภัณฑ์การแพทย์ศิริราช (ขายบัตรเข้าชม)</h1>
            <p class="subtitle" data-i18n="subtitle">คลิกปุ่มด้านล่างเพื่อเปิดระบบนำทางเท้า</p>
            <div class="features">
                <div class="feature-item">
                    <span class="feature-icon">🗺️</span>
                    <span data-i18n="feature_1">ดูเส้นทางและจุดเลี้ยวทั้งหมด</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">🚶</span>
                    <span data-i18n="feature_2">นำทางเดินเท้าด้วย Google Maps</span>
                </div>
            </div>
            
            <button id="btn-gmaps" class="btn-primary btn-google" onclick="openGoogleMaps()">
                <span class="btn-icon">📍</span>
                <span data-i18n="btn_start">เริ่มนำทาง (Google Maps)</span>
            </button>
            
            <p class="hint" data-i18n="hint">* ระบบจะเปิดแอป Google Maps และเริ่มนำทางให้อัตโนมัติ</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
